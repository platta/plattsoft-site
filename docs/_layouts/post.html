---
layout: default
---
<div class="container-fluid bg-white pt-3">
  <div class="row">
    <div class="col-lg-9 px-lg-4 pb-lg-4">
      <h1>{{ page.title }}</h1>
      {{ content }}
      {% if page.tags and page.tags.size > 0 %}
      <div class="mt-3 pt-3 border-top">
        <strong>Tags:</strong>
        {% for tag in page.tags %}
        <a href="{{ '/tags/' | append: tag | relative_url }}" class="badge bg-secondary text-decoration-none me-1">{{ tag }}</a>
        {% endfor %}
      </div>
      {% endif %}
    </div>
    <div class="col-lg-3">
      {% include sidebar.html %}
    </div>
  </div>
</div>
